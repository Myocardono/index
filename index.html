<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlenratespiel</title>

    <!-- Google Fonts für die Schriftart -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS für das Design -->
    <style>
        body {
            font-family: 'Roboto', sans-serif; /* Neue Schriftart */
            margin: 0;
            padding: 0;
            background-color: #f4f4f9; /* Helles, freundliches Grau */
            color: #333;
        }

        h1 {
            text-align: center;
            color: #4CAF50; /* Grüner Titel */
            font-size: 36px;
            margin-top: 30px;
        }

        #game-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.1);
            width: 300px;
            margin: 30px auto;
            text-align: center;
        }

        input, button {
            padding: 12px;
            width: 80%;
            font-size: 18px;
            margin: 10px auto;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #4CAF50; /* Grüner Button */
            color: white;
            cursor: pointer;
            transition: all 0.3s ease; /* Sanfter Übergang bei Hover */
        }

        button:hover {
            background-color: #45a049; /* Etwas dunkleres Grün bei Hover */
            transform: translateY(-3px); /* Leichtes Heben des Buttons */
        }

        #message {
            font-size: 18px;
            color: #4CAF50; /* Grüne Nachricht */
            font-weight: bold;
        }

        /* Neuer Style für den Highscore zurücksetzen Button */
        .reset-button {
            background-color: #f44336; /* Roter Button für Reset */
        }

        .reset-button:hover {
            background-color: #e53935; /* Dunkleres Rot bei Hover */
        }

        /* Wackel-Animation für den Highscore-Button */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .reset-button:active {
            animation: shake 0.3s ease; /* Wackeln, wenn gedrückt */
        }
    </style>
</head>

<body>
    <h1>Zahlenratespiel</h1>

    <div id="game-container">
        <p>Rate die Zahl zwischen 1 und 100:</p>
        <input type="number" id="guess" min="1" max="100">
        <button onclick="checkGuess()">Raten</button>
        <button onclick="startNewGame()">Neues Spiel</button> <!-- Der "Neues Spiel"-Button -->
        <button onclick="resetHighscore()" class="reset-button">Highscore zurücksetzen</button> <!-- Der Button für den Highscore -->
        <p id="message"></p>
    </div>

    <!-- Dein JavaScript-Code hier -->
    <script src="script.js"></script>
</body>
</html>
