<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<title>Zahlenratespiel</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:100px;
}

h1{
color:#333;
}

input{
padding:10px;
font-size:18px;
width:100px;
}

button{
padding:10px 20px;
font-size:18px;
margin:5px;
cursor:pointer;
}

#ergebnis{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Zahlenratespiel</h1>

<p>Ich denke mir eine Zahl zwischen 1 und 100.</p>

<input type="number" id="eingabe">

<button onclick="rate()">Raten</button>
<button onclick="neuesSpiel()">Neues Spiel</button>

<p id="ergebnis"></p>
<p id="versuche"></p>

<script>

let geheimeZahl;
let versuchCounter;

function neuesSpiel(){

geheimeZahl = Math.floor(Math.random()*100)+1;
versuchCounter = 0;

document.getElementById("ergebnis").innerText = "";
document.getElementById("versuche").innerText = "";
document.getElementById("eingabe").value = "";

}

function rate(){

let tipp = document.getElementById("eingabe").value;
versuchCounter++;

if(tipp == geheimeZahl){

document.getElementById("ergebnis").innerText =
"Richtig! Die Zahl war " + geheimeZahl;

document.getElementById("versuche").innerText =
"Du hast " + versuchCounter + " Versuche gebraucht.";

}

else if(tipp < geheimeZahl){

document.getElementById("ergebnis").innerText =
"Zu niedrig!";

}

else{

document.getElementById("ergebnis").innerText =
"Zu hoch!";

}

}

neuesSpiel();

</script>

<script src="script.js" defer></script>

</body>
</html>
